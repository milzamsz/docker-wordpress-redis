services:
  wp:
    image: wordpress:6.9.4-php8.3-apache
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "80"
    command: >
      bash -c " a2enmod rewrite headers remoteip && if [ ! -f /var/www/html/index.php ]; then
        cp -a /usr/src/wordpress/. /var/www/html/;
      fi && if [ ! -f /var/www/html/wp-config.php ] && [ -f /var/www/html/wp-config-docker.php ]; then
        cp /var/www/html/wp-config-docker.php /var/www/html/wp-config.php;
      fi && chown -R www-data:www-data /var/www/html && apache2-foreground "
    volumes:
      - wp_app:/var/www/html
      - ../files/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
      - ../files/servername.conf:/etc/apache2/conf-enabled/servername.conf:ro
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${DB_NAME}
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WP_TABLE_PREFIX:-wp_}
      WORDPRESS_DEBUG: ${WORDPRESS_DEBUG:-0}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_MEMORY_LIMIT', '256M');
        define('WP_MAX_MEMORY_LIMIT', '512M');

        define('DISALLOW_FILE_EDIT', true);
        define('DISALLOW_FILE_MODS', false);
        define('AUTOMATIC_UPDATER_DISABLED', true);

        define('WP_REDIS_HOST', 'redis');
        define('WP_REDIS_PORT', 6379);
        define('WP_CACHE', true);

        define('DISABLE_WP_CRON', true);
    healthcheck:
      test: [ "CMD-SHELL", "test -f /var/www/html/wp-config.php && test -f /var/www/html/wp-login.php || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 90s

  db:
    image: mariadb:10.11
    restart: unless-stopped
    command:
      - --transaction-isolation=READ-COMMITTED
      - --binlog-format=ROW
      - --max_allowed_packet=256M
      - --innodb-buffer-pool-size=512M
      - --innodb-log-file-size=256M
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-name-resolve
    volumes:
      - wp_db:/var/lib/mysql
    environment:
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "mariadb-admin ping -h localhost -u root -p$${MARIADB_ROOT_PASSWORD} --silent" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: [ "redis-server", "--save", "60", "1", "--loglevel", "warning", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru" ]
    volumes:
      - wp_redis:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080"
    environment:
      ADMINER_DEFAULT_SERVER: db

volumes:
  wp_app:
  wp_db:
  wp_redis:
